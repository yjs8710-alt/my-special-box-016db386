  <body>
    <div id="root"></div>
    <script>
      (function () {
        var RECOVERY_KEY = 'jibda_boot_recovery_SITE_BOOT_FIX_20260508_02';
        var STARTED_AT = Date.now();

        function isPreviewFrame() {
          try {
            return window.self !== window.top || window.location.hostname.indexOf('lovable') !== -1;
          } catch (e) {
            return true;
          }
        }

        function clearAppCaches() {
          try {
            if ('serviceWorker' in navigator) {
              navigator.serviceWorker.getRegistrations().then(function (registrations) {
                registrations.forEach(function (registration) { registration.unregister(); });
              });
            }
            if ('caches' in window) {
              caches.keys().then(function (keys) {
                keys.forEach(function (key) { caches.delete(key); });
              });
            }
          } catch (e) {}
        }

        function recoverBlankScreen() {
          if (isPreviewFrame() || sessionStorage.getItem(RECOVERY_KEY)) return;
          sessionStorage.setItem(RECOVERY_KEY, '1');
          clearAppCaches();
          var freshUrl = new URL(window.location.href);
          freshUrl.searchParams.set('v', Date.now().toString());
          freshUrl.searchParams.set('recover', '1');
          window.location.replace(freshUrl.toString());
        }

        function showManualRecovery() {
          var root = document.getElementById('root');
          if (!root || root.childElementCount > 0) return;
          root.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#001a4d;color:white;text-align:center;padding:24px;font-family:system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif"><div><strong style="display:block;font-size:24px;margin-bottom:10px">Zibda</strong><p style="margin:0 0 18px;font-size:15px;line-height:1.6">화면을 새로 불러오고 있습니다.</p><button id="jibda-reload" style="border:0;border-radius:999px;background:#f97316;color:white;font-weight:800;padding:12px 18px;font-size:15px">다시 불러오기</button></div></div>';
          var button = document.getElementById('jibda-reload');
          if (button) button.onclick = function () {
            clearAppCaches();
            var url = new URL(window.location.href);
            url.searchParams.set('v', Date.now().toString());
            url.searchParams.set('recover', 'manual');
            window.location.replace(url.toString());
          };
        }

        window.addEventListener('error', function (event) {
          var target = event && event.target;
          if (target && (target.tagName === 'SCRIPT' || target.tagName === 'LINK')) recoverBlankScreen();
        }, true);

        setTimeout(function () {
          var root = document.getElementById('root');
          if (root && root.childElementCount === 0) recoverBlankScreen();
        }, 4500);

        setTimeout(function () {
          var root = document.getElementById('root');
          if (root && root.childElementCount === 0 && Date.now() - STARTED_AT > 7500) showManualRecovery();
        }, 8000);

        try {
          var match = window.location.pathname.match(/^\/property\/([^/]+)$/);
          if (match) {
            window.location.replace('/share/' + match[1] + window.location.search + window.location.hash);
            return;
          }

          clearAppCaches();
        } catch (e) {}
      })();
    </script>
